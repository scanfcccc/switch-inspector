# =============================================================================
# 告警规则配置模板
# =============================================================================
# 使用方法：
#   1. 复制本文件为 rules.yaml（与 rules.example.yaml 同目录）
#   2. 根据实际环境修改阈值和开关
#   3. 引擎启动时自动加载 rules.yaml 中的配置
#
# 告警严重等级（由 engine/alert_rule_base.py 定义）：
#   INFO    = 1  — 通知/合规提醒，不影响业务
#   WARNING = 2  — 需关注，建议尽快处理
#   CRITICAL = 3 — 需立即处理，可能影响业务
# =============================================================================

rules:

  # ---------------------------------------------------------------------------
  # 规则 1：光功率告警 (optics_power)
  # ---------------------------------------------------------------------------
  # 用途：监控光模块 RX/TX 光功率是否低于阈值，提前发现光纤链路劣化。
  # 数据来源：show interfaces transceiver diagnosis（DDM 诊断信息）
  # 关联字段：ddm_rx_power, ddm_tx_power, ddm_present
  # 严重等级：
  #   - WARNING  — 功率低于 warn_threshold，链路质量下降
  #   - CRITICAL — 功率低于 crit_threshold，链路濒临中断
  # ---------------------------------------------------------------------------
  optics_power:
    # 是否启用该规则
    enabled: true

    # 告警阈值（dBm）— 当 RX 光功率低于此值时产生 WARNING 告警
    # 典型值范围：-10.0 ~ -20.0（取决于光模块类型和链路长度）
    # 默认 -15.0 dBm 适用于大多数 1km-10km 单模模块
    warn_threshold: -15.0

    # 严重告警阈值（dBm）— 当 RX 光功率低于此值时产生 CRITICAL 告警
    # 建议比 warn_threshold 低 3~5 dBm
    # 低于此值说明信号极弱，接近接收机灵敏度极限
    crit_threshold: -20.0

  # ---------------------------------------------------------------------------
  # 规则 2：接口错误计数告警 (interface_errors)
  # ---------------------------------------------------------------------------
  # 用途：监控接口错误计数是否超过阈值，识别硬件故障或链路质量问题。
  # 数据来源：show interfaces counters errors
  # 关联错误字段：
  #   - undersize      — 小于 64 字节的帧
  #   - oversize       — 大于 1518 字节的帧
  #   - collisions     — 冲突次数
  #   - fragments      — 碎片帧
  #   - jabbers        — Jabber 帧（超长且 FCS 错误）
  #   - crc_align_err  — CRC 对齐错误
  #   - align_err      — 对齐错误
  #   - fcs_err        — FCS 帧校验错误
  # 严重等级：
  #   - WARNING — 任一错误计数超过 max_errors，需排查链路
  #   - 若错误持续增长且超过 max_errors 数倍，建议升级为人工处理
  # ---------------------------------------------------------------------------
  interface_errors:
    # 是否启用该规则
    enabled: true

    # 错误计数阈值 — 任一错误类型超过此值即触发 WARNING 告警
    # 单位：帧数（累计值）
    # 默认 100，建议根据基线调整：
    #   - 纯二层接入：50~100
    #   - 核心/汇聚：100~500（流量大，错误基数更高）
    max_errors: 100

  # ---------------------------------------------------------------------------
  # 规则 3：风暴控制合规检查 (storm_control)
  # ---------------------------------------------------------------------------
  # 用途：检查接口是否配置了 storm-control，确保广播/组播/未知单播风暴防护。
  # 这是合规性检查，而非实时指标监控。
  # 数据来源：show run（接口配置）
  # 关联字段：storm_control（在接口配置中查找 storm-control 关键字）
  # 严重等级：
  #   - INFO（strict: false）— 仅提示，不告警
  #   - WARNING（strict: true）— 产生告警，需整改
  # ---------------------------------------------------------------------------
  storm_control:
    # 是否启用该规则
    enabled: true

    # 是否要求所有接口必须启用风暴控制
    # true  — 未配置 storm-control 的接口视为不合规
    # false — 仅检查，不强制要求
    required: true

    # 严格模式 — 控制不合规时的告警等级
    # true  — 产生 WARNING 告警（默认）
    # false — 产生 INFO 通知，仅用于统计
    strict: true

  # ---------------------------------------------------------------------------
  # 规则 4：系统健康检查 (system_health)
  # ---------------------------------------------------------------------------
  # 用途：检查设备硬件状态，包括风扇、温度、电源等关键部件。
  # 数据来源：
  #   - show fan speed                        — 风扇状态与转速
  #   - show interfaces transceiver diagnosis — 光模块 DDM 温度
  #   - show env / show environment（若设备支持）— 电源状态
  # 严重等级：
  #   - INFO     — 单项检查未通过，但不影响运行
  #   - WARNING  — 温度接近上限或风扇异常，需关注
  #   - CRITICAL — 温度超过 max_temp 或电源故障，需立即处理
  # ---------------------------------------------------------------------------
  system_health:
    # 是否启用该规则
    enabled: true

    # 温度上限（摄氏度）— 超过此值触发 CRITICAL 告警
    # 交换机正常工作温度范围一般为 0~50°C
    # 建议设为 55~60°C，留有余量
    max_temp: 60

    # 检查项列表 — 需执行哪些健康检查
    # 可用值：
    #   - fan         风扇状态（检查风扇是否运转、转速是否正常）
    #   - temperature 温度检查（对比 max_temp）
    #   - power       电源状态（检查电源模块是否在位、输出是否正常）
    checks:
      - fan
      - temperature
      - power
